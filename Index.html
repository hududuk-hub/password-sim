<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Hacking Simulator</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#1e40af', 600: '#1e3a8a' },
                        semantic: { success: '#16a34a', warning: '#ea580c', error: '#dc2626', skipped: '#64748b' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Helper: SHA256 Hash ---
        const generateHash = (text) => CryptoJS.SHA256(text).toString();

        // --- UI Components ---
        const Button = ({ onClick, children, variant = 'primary', disabled = false, className = '' }) => {
            const baseStyle = "px-4 py-2 rounded-md font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-primary-500 text-white hover:bg-primary-600",
                success: "bg-semantic-success text-white hover:bg-green-700",
                outline: "bg-white border border-neutral-300 text-neutral-700 hover:bg-neutral-50",
                skip: "text-neutral-500 underline hover:text-neutral-700 text-sm px-2 py-1"
            };
            return (
                <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Feedback = ({ type, message }) => {
            if (!message) return null;
            const styles = {
                error: "bg-red-50 text-semantic-error border-red-200",
                success: "bg-green-50 text-semantic-success border-green-200",
                info: "bg-blue-50 text-primary-600 border-blue-200"
            };
            return (
                <div className={`mt-4 p-3 rounded-lg border text-sm font-medium fade-in ${styles[type]}`}>
                    {message}
                </div>
            );
        };

        // --- Stages ---
        const Stage1 = ({ onComplete, onHint, onSkip, status }) => {
            const targetPassword = "789";
            const targetHash = generateHash(targetPassword);
            const [input, setInput] = useState("");
            const [attempts, setAttempts] = useState(0);
            const [feedback, setFeedback] = useState(null);

            const isDone = status === 'completed' || status === 'completed_with_hint' || status === 'skipped';

            const handleTry = () => {
                setAttempts(a => a + 1);
                if (input === targetPassword) {
                    setFeedback({ type: 'success', msg: `성공! 비밀번호를 찾았습니다.` });
                    onComplete();
                } else {
                    setFeedback({ type: 'error', msg: `실패! 입력값의 해시가 일치하지 않습니다.` });
                }
            };

            return (
                <div className="space-y-4 fade-in">
                    <h2 className="text-xl font-bold">1단계: 브루트 포스 (무차별 대입)</h2>
                    <p className="text-sm text-neutral-600">아래 해시값을 만드는 원래의 비밀번호를 맞춰보세요.</p>
                    <div className="bg-neutral-100 p-4 rounded-md break-all font-mono text-sm border">
                        <span className="text-neutral-500">타겟 해시:</span> <br/>
                        <strong className="text-primary-600">{targetHash}</strong>
                    </div>
                    <div className="flex gap-2">
                        <input 
                            type="text" 
                            placeholder="추측값 입력" 
                            className="flex-1 border border-neutral-300 rounded-md px-4 py-2 focus:border-primary-500 focus:outline-none"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            disabled={isDone}
                        />
                        <Button onClick={handleTry} disabled={isDone || !input}>시도하기</Button>
                    </div>
                    
                    <Feedback type={feedback?.type} message={feedback?.msg} />
                    
                    {!isDone && (
                        <div className="flex justify-between items-center mt-6 pt-4 border-t border-neutral-100">
                            <Button variant="outline" onClick={onHint}>💡 힌트 보기</Button>
                            <Button variant="skip" onClick={onSkip}>이 단계 건너뛰기</Button>
                        </div>
                    )}
                </div>
            );
        };

        const Stage2 = ({ onComplete, onHint, onSkip, status }) => {
            const dictionary = ["123456", "admin", "password", "qwerty", "iloveyou"];
            const targetPassword = "password";
            const targetHash = generateHash(targetPassword);
            const [testingIdx, setTestingIdx] = useState(-1);
            const [isRunning, setIsRunning] = useState(false);
            const [success, setSuccess] = useState(false);

            const isDone = status === 'completed' || status === 'completed_with_hint' || status === 'skipped';

            const startAttack = () => {
                setIsRunning(true);
                let i = 0;
                const interval = setInterval(() => {
                    setTestingIdx(i);
                    if (dictionary[i] === targetPassword) {
                        clearInterval(interval);
                        setIsRunning(false);
                        setSuccess(true);
                        onComplete();
                    }
                    i++;
                }, 300);
            };

            return (
                <div className="space-y-4 fade-in">
                    <h2 className="text-xl font-bold">2단계: 사전 공격 (Dictionary Attack)</h2>
                    <p className="text-sm text-neutral-600">사람들이 자주 쓰는 비밀번호 목록(사전)을 자동으로 대입해 봅니다.</p>
                    <div className="bg-neutral-100 p-4 rounded-md break-all font-mono text-sm border">
                        <span className="text-neutral-500">타겟 해시:</span> <br/>
                        <strong className="text-primary-600">{targetHash}</strong>
                    </div>
                    
                    <Button onClick={startAttack} disabled={isRunning || isDone || success} className="w-full">
                        🚀 자동 사전 공격 시작
                    </Button>
                    
                    <div className="border border-neutral-200 rounded-md p-4 bg-white mt-4 h-40 overflow-hidden relative">
                        <h3 className="text-xs font-bold text-neutral-500 mb-2">테스트 중인 단어 목록</h3>
                        <ul className="space-y-1 font-mono text-sm">
                            {dictionary.map((word, idx) => (
                                <li key={word} className={`p-1 rounded transition-colors ${testingIdx === idx ? 'bg-primary-100 text-primary-600 font-bold' : 'text-neutral-400'}`}>
                                    {idx <= testingIdx ? `[대조중...] ${word}` : word}
                                </li>
                            ))}
                        </ul>
                    </div>

                    {success && <Feedback type="error" message={`취약점 발견! 흔한 비밀번호 "${targetPassword}"가 순식간에 뚫렸습니다.`} />}

                    {!isDone && !success && (
                        <div className="flex justify-between items-center mt-6 pt-4 border-t border-neutral-100">
                            <Button variant="outline" onClick={onHint}>💡 힌트 보기</Button>
                            <Button variant="skip" onClick={onSkip}>이 단계 건너뛰기</Button>
                        </div>
                    )}
                </div>
            );
        };

        const Stage3 = ({ onComplete, onHint, onSkip, status }) => {
            const targetPassword = "admin";
            const targetHash = generateHash(targetPassword);
            const [feedback, setFeedback] = useState(null);

            const isDone = status === 'completed' || status === 'completed_with_hint' || status === 'skipped';

            const lookupTable = {
                [generateHash("123456")]: "123456",
                [generateHash("password")]: "password",
                [generateHash("admin")]: "admin",
            };

            const handleLookup = () => {
                const found = lookupTable[targetHash];
                if (found) {
                    setFeedback({ type: 'error', msg: `해킹 성공! 0.01초 만에 평문 "${found}" 을(를) 찾았습니다.` });
                    onComplete();
                }
            };

            return (
                <div className="space-y-4 fade-in">
                    <h2 className="text-xl font-bold">3단계: 레인보우 테이블</h2>
                    <p className="text-sm text-neutral-600">해시값을 미리 다 계산해서 표로 만들어두면 어떻게 될까요?</p>
                    <div className="bg-neutral-100 p-4 rounded-md break-all font-mono text-sm border">
                        <span className="text-neutral-500">타겟 해시:</span> <br/>
                        <strong className="text-primary-600">{targetHash}</strong>
                    </div>
                    
                    <div className="bg-white border border-neutral-200 rounded-md p-4 overflow-x-auto">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-neutral-50 text-neutral-500 border-b">
                                <tr><th className="px-2 py-1">미리 계산된 해시 (Key)</th><th className="px-2 py-1">평문 (Value)</th></tr>
                            </thead>
                            <tbody className="font-mono text-xs">
                                {Object.entries(lookupTable).map(([hash, pwd]) => (
                                    <tr key={hash} className="border-b last:border-0">
                                        <td className="px-2 py-2 truncate max-w-[150px] text-neutral-500">{hash}</td>
                                        <td className="px-2 py-2 font-bold">{pwd}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <Button onClick={handleLookup} disabled={isDone || feedback} className="w-full">
                        🔍 테이블 즉시 조회하기
                    </Button>
                    <Feedback type={feedback?.type} message={feedback?.msg} />

                    {!isDone && !feedback && (
                        <div className="flex justify-between items-center mt-6 pt-4 border-t border-neutral-100">
                            <Button variant="outline" onClick={onHint}>💡 힌트 보기</Button>
                            <Button variant="skip" onClick={onSkip}>이 단계 건너뛰기</Button>
                        </div>
                    )}
                </div>
            );
        };

        const Stage4 = ({ onComplete, onHint, onSkip, status }) => {
            const password = "admin";
            const salt = "Xy7@K!";
            const [isSalted, setIsSalted] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const isDone = status === 'completed' || status === 'completed_with_hint' || status === 'skipped';
            const targetHash = isSalted ? generateHash(password + salt) : generateHash(password);
            
            const rainbowTable = { [generateHash("admin")]: "admin" }; 

            const handleLookup = () => {
                const found = rainbowTable[targetHash];
                if (found) {
                    setFeedback({ type: 'error', msg: `위험! 레인보우 테이블에서 "${found}" 을(를) 찾았습니다.` });
                } else {
                    setFeedback({ type: 'success', msg: `방어 성공! 타겟 해시가 변경되어 기존 테이블로 찾을 수 없습니다.` });
                    onComplete();
                }
            };

            return (
                <div className="space-y-4 fade-in">
                    <h2 className="text-xl font-bold">4단계: 솔트 (Salt) 방어</h2>
                    <p className="text-sm text-neutral-600">방어자의 턴입니다. 비밀번호에 무작위 문자열(Salt)을 추가해봅시다.</p>
                    
                    <div className="flex items-center justify-between bg-primary-50 p-4 rounded-md border border-primary-100">
                        <div>
                            <p className="font-bold text-primary-600">Salt 활성화 토글</p>
                        </div>
                        <label className="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" className="sr-only peer" checked={isSalted} onChange={(e) => {
                                setIsSalted(e.target.checked);
                                setFeedback(null);
                            }} disabled={isDone} />
                            <div className="w-11 h-6 bg-neutral-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-semantic-success"></div>
                        </label>
                    </div>

                    <div className="bg-neutral-100 p-4 rounded-md break-all font-mono text-sm border transition-all">
                        <span className="text-neutral-500">생성 원리:</span> <br/>
                        <span>{password} {isSalted && <span className="text-semantic-success font-bold">+ "{salt}"</span>}</span> <br/><br/>
                        <span className="text-neutral-500">최종 타겟 해시:</span> <br/>
                        <strong className={isSalted ? "text-semantic-success" : "text-primary-600"}>{targetHash}</strong>
                    </div>

                    <Button onClick={handleLookup} disabled={isDone} className="w-full">
                        레인보우 테이블로 공격 시도
                    </Button>
                    <Feedback type={feedback?.type} message={feedback?.msg} />
                    
                    {!isDone && (
                        <div className="flex justify-between items-center mt-6 pt-4 border-t border-neutral-100">
                            <Button variant="outline" onClick={onHint}>💡 힌트 보기</Button>
                            <Button variant="skip" onClick={onSkip}>이 단계 건너뛰기</Button>
                        </div>
                    )}
                </div>
            );
        };

        const Summary = ({ progress, onReset }) => (
            <div className="space-y-6 text-center fade-in max-w-2xl mx-auto py-8">
                <div className="w-16 h-16 bg-primary-100 rounded-full flex items-center justify-center mx-auto mb-2">
                    <span className="text-3xl">🎓</span>
                </div>
                <h2 className="text-2xl font-bold text-neutral-900">시뮬레이션 완료 리포트</h2>
                <p className="text-neutral-600">모든 단계의 학습을 마쳤습니다. 결과를 확인해보세요.</p>
                
                <div className="text-left space-y-3 mt-6">
                    {[
                        { id: 1, title: '브루트 포스', desc: '경우의 수를 모두 대입하는 방식. 짧은 비밀번호는 위험합니다.' },
                        { id: 2, title: '사전 공격', desc: '흔한 단어를 대입하는 방식. 예측 가능한 비밀번호는 위험합니다.' },
                        { id: 3, title: '레인보우 테이블', desc: '미리 계산된 해시 표를 이용하는 방식. 탐색 속도가 극대화됩니다.' },
                        { id: 4, title: '솔트(Salt)', desc: '비밀번호에 무작위 문자열을 더해 해시를 생성하여 방어하는 기술입니다.' }
                    ].map(st => (
                        <div key={st.id} className="bg-white p-4 rounded-lg border shadow-sm flex items-start gap-4">
                            <div className="mt-1">
                                {progress[st.id] === 'completed' && <span className="text-semantic-success font-bold">✅ 완료</span>}
                                {progress[st.id] === 'completed_with_hint' && <span className="text-primary-500 font-bold">💡 힌트완료</span>}
                                {progress[st.id] === 'skipped' && <span className="text-semantic-skipped font-bold">⏭️ 건너뜀</span>}
                            </div>
                            <div>
                                <h4 className="font-bold text-neutral-900">{st.id}단계: {st.title}</h4>
                                <p className="text-sm text-neutral-600 mt-1">{st.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
                <div className="pt-6">
                    <Button onClick={onReset} variant="primary">처음부터 다시 학습하기</Button>
                </div>
            </div>
        );

        // --- Main Application ---
        const App = () => {
            const [stage, setStage] = useState(0);
            // progress: 'pending', 'completed', 'completed_with_hint', 'skipped'
            const [progress, setProgress] = useState({ 1: 'pending', 2: 'pending', 3: 'pending', 4: 'pending' });
            
            // Insight Panel State
            const [insightMode, setInsightMode] = useState('default'); // 'default', 'hint', 'skip_summary'

            const insights = {
                1: "모든 경우의 수를 하나씩 대입하는 기초적인 공격 방법입니다.",
                2: "사람들이 흔히 사용하는 단어(사전)를 모아 대입하면 공격이 훨씬 빨라집니다.",
                3: "해시값을 역추적하기 위해 미리 계산해둔 거대한 표를 사용합니다.",
                4: "솔트(Salt)는 비밀번호를 해시화하기 전 임의의 문자를 덧붙여 테이블 공격을 무력화합니다."
            };

            const hints = {
                1: "힌트: 비밀번호는 '숫자 3자리'로 구성되어 있습니다. (예: 123, 456)",
                2: "힌트: 공격자는 사람이 기억하기 쉬운 '단어'를 먼저 공격합니다. 버튼을 눌러보세요.",
                3: "힌트: 해시를 그때그때 계산하지 않고, '이미 만들어진 표'에서 검색만 하기 때문에 엄청나게 빠릅니다.",
                4: "힌트: 솔트 토글을 켜면 타겟 해시값이 초록색으로 완전히 변하는 것을 확인하세요."
            };

            const skipSummaries = {
                1: "[건너뜀 요약] 무차별 대입은 확실하지만 엄청난 시간이 걸립니다. 짧은 비밀번호가 취약한 이유입니다.",
                2: "[건너뜀 요약] 흔한 비밀번호는 사전에 등록되어 있어 자동화 공격에 1초도 안되어 뚫리게 됩니다.",
                3: "[건너뜀 요약] 해시값을 미리 계산해두면 공격 속도가 기하급수적으로 빨라집니다.",
                4: "[건너뜀 요약] 솔트는 비밀번호에 무작위 데이터를 더해 기존 레인보우 테이블을 무용지물로 만듭니다."
            };

            const handleComplete = () => {
                setProgress(prev => ({ 
                    ...prev, 
                    [stage]: insightMode === 'hint' ? 'completed_with_hint' : 'completed' 
                }));
                setInsightMode('default');
            };

            const handleHint = () => setInsightMode('hint');

            const handleSkip = () => {
                if(window.confirm("이 단계를 건너뛰시겠습니까? 다음 단계로 넘어가기 전 핵심 원리가 요약됩니다.")) {
                    setProgress(prev => ({ ...prev, [stage]: 'skipped' }));
                    setInsightMode('skip_summary');
                }
            };

            const nextStage = () => {
                setStage(s => s + 1);
                setInsightMode('default');
            };

            const stages = [
                { id: 1, title: "브루트 포스", component: <Stage1 onComplete={handleComplete} onHint={handleHint} onSkip={handleSkip} status={progress[1]} /> },
                { id: 2, title: "사전 공격", component: <Stage2 onComplete={handleComplete} onHint={handleHint} onSkip={handleSkip} status={progress[2]} /> },
                { id: 3, title: "레인보우 테이블", component: <Stage3 onComplete={handleComplete} onHint={handleHint} onSkip={handleSkip} status={progress[3]} /> },
                { id: 4, title: "솔트(Salt)", component: <Stage4 onComplete={handleComplete} onHint={handleHint} onSkip={handleSkip} status={progress[4]} /> },
                { id: 5, title: "학습 요약", component: <Summary progress={progress} onReset={() => { setStage(0); setProgress({1:'pending', 2:'pending', 3:'pending', 4:'pending'}); }} /> }
            ];

            if (stage === 0) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md bg-white p-8 rounded-xl shadow-lg border border-neutral-200 text-center">
                            <div className="text-4xl mb-4">🛡️</div>
                            <h1 className="text-2xl font-bold mb-2 text-primary-600">Password Hacking Simulator</h1>
                            <p className="text-neutral-600 mb-6 text-sm leading-relaxed bg-neutral-50 p-4 rounded-md">
                                본 시뮬레이터는 <strong>교육 목적</strong>으로 설계되었습니다. <br/>
                                실제 해킹이나 타인의 계정을 공격하는 도구가 아니며, 내장된 샘플 데이터로만 안전하게 동작합니다.
                            </p>
                            <Button onClick={() => setStage(1)} className="w-full text-lg">윤리 가이드 동의 및 시작하기</Button>
                        </div>
                    </div>
                );
            }

            const currentStatus = progress[stage];
            const isDone = currentStatus === 'completed' || currentStatus === 'completed_with_hint' || currentStatus === 'skipped';

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Left Sidebar */}
                    <aside className="w-full md:w-64 bg-white border-r border-neutral-200 p-6 flex flex-col">
                        <h1 className="text-lg font-bold text-neutral-900 mb-8 flex items-center gap-2">
                            <span className="w-3 h-3 rounded-full bg-primary-500"></span> 교육 시뮬레이터
                        </h1>
                        <nav className="space-y-2 flex-1">
                            {stages.slice(0, 4).map((s) => {
                                const st = progress[s.id];
                                let style = "text-neutral-400";
                                let icon = s.id;
                                
                                if (stage === s.id) style = "bg-primary-50 text-primary-600 border border-primary-100 font-bold";
                                else if (st === 'completed') { style = "text-semantic-success"; icon = "✓"; }
                                else if (st === 'completed_with_hint') { style = "text-primary-500"; icon = "💡"; }
                                else if (st === 'skipped') { style = "text-semantic-skipped"; icon = "⏭️"; }

                                return (
                                    <div key={s.id} className={`p-3 rounded-lg flex items-center gap-3 text-sm transition-colors ${style}`}>
                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs bg-white border border-current`}>
                                            {icon}
                                        </div>
                                        {s.title}
                                    </div>
                                );
                            })}
                        </nav>
                    </aside>

                    {/* Main Workspace */}
                    <main className="flex-1 p-6 md:p-12 overflow-y-auto flex justify-center">
                        <div className="w-full max-w-2xl">
                            <div className="bg-white p-8 rounded-xl shadow-sm border border-neutral-200 min-h-[450px]">
                                {stages.find(s => s.id === stage)?.component}
                            </div>
                        </div>
                    </main>

                    {/* Right Insight Panel */}
                    {stage < 5 && (
                        <aside className="w-full md:w-80 bg-primary-50 border-l border-primary-100 p-6 flex flex-col">
                            <h3 className="text-primary-600 font-bold mb-4 flex items-center gap-2">
                                💡 인사이트 패널
                            </h3>
                            
                            <div className={`p-4 rounded-lg shadow-sm border transition-all ${
                                insightMode === 'skip_summary' ? 'bg-slate-800 text-white border-slate-900' :
                                insightMode === 'hint' ? 'bg-amber-50 border-amber-200 text-amber-900' :
                                'bg-white border-primary-100 text-neutral-700'
                            }`}>
                                <p className="text-sm leading-relaxed font-medium">
                                    {insightMode === 'default' && insights[stage]}
                                    {insightMode === 'hint' && hints[stage]}
                                    {insightMode === 'skip_summary' && skipSummaries[stage]}
                                </p>
                            </div>

                            {isDone && (
                                <div className="mt-auto pt-6 fade-in">
                                    <Button onClick={nextStage} variant="success" className="w-full shadow-lg">
                                        {stage === 4 ? '결과 리포트 보기' : '다음 단계로 이동하기 →'}
                                    </Button>
                                </div>
                            )}
                        </aside>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
